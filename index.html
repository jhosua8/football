<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FootballHub</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/pages.css">
</head>

<body class="home-body fade-in">

    <!-- HEADER -->
    <header class="main-header">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/LaLiga_logo_2023.svg" alt="Logo LaLiga"
                class="logo-laliga">
            <h1 class="site-title">FootballHub</h1>
        </div>

    </header>

    <!-- BANNER -->
    <section class="hero-banner">
        <div class="hero-overlay">
            <h2>La emoción del fútbol en un solo lugar</h2>
            <p>En esta página encontrarás los resultados de la Jornada 38 de la Liga 2023-2024</p>
        </div>
    </section>

    <!-- TARJETAS DE NAVEGACIÓN -->
    <section class="cards-section">
        <div class="card" onclick="location.href='pages/equipos.html'">
            <img src="https://images.unsplash.com/photo-1517927033932-b3d18e61fb3a" alt="Equipos">
            <h3>Equipos</h3>
        </div>

        <div class="card" onclick="location.href='pages/partidos.html'">
            <img src="https://cdn.pixabay.com/photo/2023/06/08/13/31/balls-8049598_1280.jpg" alt="Partidos">
            <h3>Partidos</h3>
        </div>

        <div class="card" onclick="location.href='pages/tabla.html'">
            <img src="https://cdn.pixabay.com/photo/2017/08/04/18/40/football-2580983_1280.jpg" alt="Tabla">
            <h3>Tabla</h3>
        </div>

        <div class="card" onclick="location.href='pages/contacto.html'">
            <img src="https://images.unsplash.com/photo-1521737604893-d14cc237f11d" alt="Contacto">
            <h3>Contacto</h3>
        </div>
    </section>
    <footer class="main-footer">
        <p>FootballHub © 2024 — Proyecto académico inspirado en LaLiga</p>
    </footer>

</body>

</html>
