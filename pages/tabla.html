<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clasificación - FootballHub</title>
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body class="home-body">

    <!-- HEADER -->
    <header class="main-header">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/LaLiga_logo_2023.svg" alt="Logo LaLiga"
                class="logo-laliga">
            <h1 class="site-title">FootballHub</h1>
        </div>

        <nav class="main-nav">
            <ul>
                <li><a href="equipos.html">Equipos</a></li>
                <li><a href="partidos.html">Partidos</a></li>
                <li><a href="tabla.html" class="active">Tabla</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section class="tabla-container">
        <h2>Clasificación LaLiga 2023-2024</h2>

        <div class="ordenacion">
            <button onclick="ordenar('puntos')">Puntos</button>
            <button onclick="ordenar('gf')">Goles a favor</button>
            <button onclick="ordenar('gc')">Goles en contra</button>
            <button onclick="ordenar('dg')">Diferencia de goles</button>
        </div>

        <table id="tabla-laliga">
            <thead>
                <tr>
                    <th>Pos</th>
                    <th>Equipo</th>
                    <th>Pts</th>
                    <th>PJ</th>
                    <th>PG</th>
                    <th>PE</th>
                    <th>PP</th>
                    <th>GF</th>
                    <th>GC</th>
                    <th>DG</th>
                </tr>
            </thead>
            <tbody></tbody>
        </table>
    </section>

    <script src="../js/data.js"></script>
    <script src="../js/ui.js"></script>
    <script src="../js/filters.js"></script>

    <script>
        let tabla = [];

        fetch("../data/tabla.json")
            .then(res => res.json())
            .then(data => {
                tabla = data;
                renderTabla(tabla);
            });

        function renderTabla(datos) {
            const tbody = document.querySelector("#tabla-laliga tbody");
            tbody.innerHTML = "";

            datos.forEach(e => {
                tbody.innerHTML += `
                    <tr>
                        <td>${e.pos}</td>
                        <td>${e.equipo}</td>
                        <td>${e.puntos}</td>
                        <td>${e.pj}</td>
                        <td>${e.pg}</td>
                        <td>${e.pe}</td>
                        <td>${e.pp}</td>
                        <td>${e.gf}</td>
                        <td>${e.gc}</td>
                        <td>${e.dg}</td>
                    </tr>
                `;
            });
        }

        function ordenar(campo) {
            const ordenado = [...tabla].sort((a, b) => b[campo] - a[campo]);
            renderTabla(ordenado);
        }
    </script>
    <button class="btn-inicio" onclick="location.href='../index.html'">Volver al inicio</button>
    <footer class="main-footer">
        <p>FootballHub © 2024 — Proyecto académico inspirado en LaLiga</p>
    </footer>

</body>

</html>
