<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - FootballHub</title>

    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/layout.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/pages.css">
</head>

<body class="home-body">

    <!-- HEADER -->
    <header class="main-header">
        <div class="logo-container">
            <img src="https://upload.wikimedia.org/wikipedia/commons/0/0f/LaLiga_logo_2023.svg" alt="Logo LaLiga"
                class="logo-laliga">
            <h1 class="site-title">FootballHub</h1>
        </div>

        <nav class="main-nav">
            <ul>
                <li><a href="equipos.html">Equipos</a></li>
                <li><a href="partidos.html">Partidos</a></li>
                <li><a href="tabla.html">Tabla</a></li>
                <li><a href="contacto.html" class="active">Contacto</a></li>
            </ul>
        </nav>
    </header>

    <section class="contacto-container">
        <h2>Formulario de Contacto</h2>

        <form id="form-contacto" novalidate>
            <label>Nombre</label>
            <input type="text" id="nombre" required>

            <label>Email</label>
            <input type="email" id="email" required>

            <label>Mensaje</label>
            <textarea id="mensaje" required></textarea>

            <button type="submit">Enviar</button>

            <p id="mensaje-exito" class="exito" style="display:none;">
                ¡Mensaje enviado correctamente!
            </p>
        </form>
    </section>

    <script>
        const form = document.getElementById("form-contacto");

        form.addEventListener("submit", e => {
            e.preventDefault();

            const nombre = document.getElementById("nombre");
            const email = document.getElementById("email");
            const mensaje = document.getElementById("mensaje");
            const exito = document.getElementById("mensaje-exito");

            let valido = true;

            if (nombre.value.trim() === "") {
                nombre.classList.add("error");
                valido = false;
            } else nombre.classList.remove("error");

            if (!email.value.includes("@") || !email.value.includes(".")) {
                email.classList.add("error");
                valido = false;
            } else email.classList.remove("error");

            if (mensaje.value.trim().length < 10) {
                mensaje.classList.add("error");
                valido = false;
            } else mensaje.classList.remove("error");

            if (valido) {
                exito.style.display = "block";
                form.reset();
            }
        });
    </script>
    <button class="btn-inicio" onclick="location.href='../index.html'">Volver al inicio</button>
    <footer class="main-footer">
        <p>FootballHub © 2024 — Proyecto académico inspirado en LaLiga</p>
    </footer>
</body>

</html>
